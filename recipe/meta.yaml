{% set name = "libhomfly" %}
{% set version = "1.04" %}
{% set posix = "m2-" if build_platform.startswith("win-") else '' %}

package:
  name: {{ name|lower }}
  version: "{{ version }}"

source:
  url: https://github.com/miguelmarco/libhomfly/releases/download/{{ version }}/libhomfly-{{ version }}.tar.gz
  sha256: 659a77b4f4b53340d24a7d6a69f4219e77ab9439a6ab8afa0156b7f6bd7af64f

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("libhomfly", max_pin="x.x") }}

requirements:
  build:
    - gnuconfig           # [unix]
    - {{ compiler('c') }} # [unix]
    - {{ stdlib("c") }}   # [unix]
    - {{ compiler("m2w64_c") }}    # [win]
    - {{ stdlib("m2w64_c") }}      # [win]
    - {{ posix }}make
    - {{ posix }}base        # [build_platform.startswith("win-")]
    - {{ posix }}diffutils   # [build_platform.startswith("win-")]

  host:
    - bdw-gc

test:
  commands:
    - test -f $PREFIX/lib/libhomfly${SHLIB_EXT}
    - test -f $PREFIX/include/homfly.h

about:
  home: https://github.com/miguelmarco/libhomfly
  license: Unlicense
  license_family: MIT
  license_file: LICENSE
  summary: 'Library to compute the homfly polynomial of a link.'
  dev_url: https://github.com/miguelmarco/libhomfly

extra:
  recipe-maintainers:
    - isuruf
    - saraedum
